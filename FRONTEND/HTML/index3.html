<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!--here we use shortcut to write html code fast
        with the help of inbuilt emmet software for example
        we write p>img and enter it to get this-->
    <p>
        <img src="" alt="">
    </p>

    <!--article+section> -->
    <article></article>
    <section></section>
    <!--here we use > as for parent child relationship
        and use + as for sibling relationship
    -->
    
    
    <!-- for inserting content we can 
        write the shortcut by p{content}>,h1{content}> like that
    -->
    <p>this is a paragraph</p>
    <h1>this is heading 1</h1>
    <article>thiis is article content</article>

    <!--for creating a id we can use p#id,article#id and more like this-->
    <p id="para1"></p>
    <article id="article1"></article>
    <section id="section1"></section>

    <!--for creating a class we can use p.{element in class},article.{element in class} and more like this-->
    <p class="para1"></p>
    <article class="article1"></article>
    <section class="section1"></section>

    <!--section>p*5> and table>tr>td*5> -->
    <section>
        <p>one</p>
        <p>two</p>
        <p>three</p>
        <p>four</p>
        <p>five</p>
    </section>
    <table>
        <tr>
            <td>one</td>
            <td>two</td>
            <td>three</td>
            <td>four</td>
            <td>five</td>
        </tr>
    </table>

    <!--table>(tr>td*5)*2>-->
    <table>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </table>

</body>
</html>
