<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Makes website responsive on all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>HTML Meta Tags Example</title>

    <!-- Short description of the webpage (SEO) -->
    <meta name="description" content="This page demonstrates all commonly used HTML meta tags with comments.">

    <!-- Keywords (Not used by Google anymore, but some search engines may use them) -->
    <meta name="keywords" content="HTML, Meta Tags, SEO, Web Development">

    <!-- Author of the webpage -->
    <meta name="author" content="Kamaljit Tripathy">

    <!-- Search engine indexing -->
    <meta name="robots" content="index, follow">

    <!-- Refresh page after 10 seconds -->
    <!-- <meta http-equiv="refresh" content="10"> -->

    <!-- Redirect after 5 seconds -->
    <!-- <meta http-equiv="refresh" content="5; url=https://example.com"> -->

    <!-- Internet Explorer Compatibility -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#0d6efd">

    <!-- Application Name -->
    <meta name="application-name" content="Meta Demo">

    <!-- Generator -->
    <meta name="generator" content="Visual Studio Code">

    <!-- Copyright -->
    <meta name="copyright" content="2026 Kamaljit">

    <!-- Reply To -->
    <meta name="reply-to" content="kamaljit1234@gmail.com">

    <!-- Rating -->
    <meta name="rating" content="General">

    <!-- Distribution -->
    <meta name="distribution" content="Global">

    <!-- Language -->
    <meta http-equiv="content-language" content="en">

    <!-- Revisit After -->
    <meta name="revisit-after" content="7 days">

    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

    <!-- Expire Immediately -->
    <meta http-equiv="Expires" content="0">

    <!-- Pragma -->
    <meta http-equiv="Pragma" content="no-cache">

    <!-- Open Graph Meta Tags (Facebook, LinkedIn) -->
    <meta property="og:title" content="Meta Tags Example">
    <meta property="og:description" content="Learn HTML Meta Tags with examples.">
    <meta property="og:image" content="image.jpg">
    <meta property="og:url" content="https://example.com">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="My Website">
    <meta property="og:locale" content="en_US">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Meta Tags Example">
    <meta name="twitter:description" content="HTML Meta Tags Tutorial">
    <meta name="twitter:image" content="image.jpg">

    <!-- Apple Mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="My App">

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="tile.png">

    <!-- Content Security Policy -->
    <!--
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';">
    -->

    <!-- Referrer Policy -->
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <!-- Color Scheme -->
    <meta name="color-scheme" content="light dark">

</head>

<body>

    <h1>HTML Meta Tags Example</h1>

    <p>This page demonstrates the most commonly used HTML meta tags.</p>

</body>

</html>
