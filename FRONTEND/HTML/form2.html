<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>


    <h2>job application form</h2>  
    <form>
        
        <label for="name" >Name: </label></br>
        <input type="text" id="name" name="name" placeholder="enter your name">
    </br>
        <label for="email" >Email: </label></br>   
        <input type="text" id="email" name="email" placeholder="enter your email">
    </br>
        <label for="phone" >Phone: </label></br>
        <input type="tel" id="phone" name="phone" placeholder="enter your phone number">
    </br>
        <label for="resume">Upload Resume: </label></br>
        <input type="file" id="resume" name="resume">
    </br>
        <label for="counter">Experience (years): </label>
        <input type="number" name="counter" id="counter" min="0" max="45">
    </br>
        <fieldset>
            <legend>Skills</legend>
            <label for="skill1">HTML</label>
            <input type="checkbox" id="skill1" name="skill" value="html">
            <label for="skill2">CSS</label>
            <input type="checkbox" id="skill2" name="skill" value="css">
            <label for="skill3">JavaScript</label>
            <input type="checkbox" id="skill3" name="skill" value="javascript"> 
        </fieldset>
    </br>
        <label for="EducationType">Education Level: </label><br>
        <select name="EducationType" id="EducationType">
            <option value="highschool">High School</option>
            <option value="bachelor">Bachelor's Degree</option>
            <option value="master">Master's Degree</option>
            <option value="phd">PhD</option>
        </select>
        <fieldset>
            <legend>Avaibility</legend>
            <label
            <label for="radio1">Full-time</label>
            <input type="radio" name="radio" id="radio1">
            <br>
            <label for="radio2" name="radio " id="radio2">Part-time</label>
            <input type="radio" name="radio" id="radio2">
            <br>
        </fieldset>
            
            <label for="comments">Additional Comments: </label></br>
            <textarea name="comments" rows="6" cols="30" placeholder="Enter your message here..."></textarea>
            <br>
        <input type="submit" value="submit Application">
        </fieldset>
    </form>

</body>
</html>
